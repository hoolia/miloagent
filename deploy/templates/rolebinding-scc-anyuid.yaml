{{- if .Values.securityContext.enabled }}
# Headless Chromium (web/cookie mode) needs anyuid, bound to the namespace default SA.
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "miloagent.fullname" . }}-anyuid
  labels:
    {{- include "miloagent.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: system:openshift:scc:anyuid
subjects:
  - kind: ServiceAccount
    name: default
    namespace: {{ .Release.Namespace }}
{{- end }}
