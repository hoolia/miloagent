{{- if .Values.imagePullSecret.create }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "miloagent.fullname" . }}-ghcr-pull
  labels:
    {{- include "miloagent.labels" . | nindent 4 }}
type: kubernetes.io/dockerconfigjson
stringData:
  # Default '{"auths":{}}' is valid-but-empty; real GHCR creds come from the Application values.
  .dockerconfigjson: {{ .Values.imagePullSecret.dockerconfigjson | default "{\"auths\":{}}" | quote }}
{{- end }}
