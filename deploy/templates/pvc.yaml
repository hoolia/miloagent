apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "miloagent.fullname" . }}-data
  labels:
    {{- include "miloagent.labels" . | nindent 4 }}
spec:
  # RWO block storage: single writer for the SQLite WAL database.
  accessModes:
    - ReadWriteOnce
  # Omit storageClassName entirely when unset → use the cluster default. (An empty string
  # "" would instead DISABLE dynamic provisioning, which is not what null means here.)
  {{- with .Values.persistence.storageClass }}
  storageClassName: {{ . }}
  {{- end }}
  resources:
    requests:
      storage: {{ .Values.persistence.size }}
