apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "miloagent.fullname" . }}-config
  labels:
    {{- include "miloagent.labels" . | nindent 4 }}
data:
  settings.yaml: |-
{{ (.Values.config.settings | default (.Files.Get "files/settings.yaml")) | indent 4 }}
  expert_personas.yaml: |-
{{ (.Values.config.expert_personas | default (.Files.Get "files/expert_personas.yaml")) | indent 4 }}
