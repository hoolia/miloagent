apiVersion: v1
kind: Secret
metadata:
  name: {{ include "miloagent.fullname" . }}-files
  labels:
    {{- include "miloagent.labels" . | nindent 4 }}
type: Opaque
stringData:
  # Whole credential files. Only non-empty values are included; an unset credential is
  # NOT mounted (see deployment), so the app falls back to the image's baked placeholder
  # file (which is known to boot). Keys stay in sync with the deployment subPath mounts.
  {{- range $k, $v := .Values.secrets }}
  {{- if $v }}
  {{ $k }}.yaml: |-
{{ $v | indent 4 }}
  {{- end }}
  {{- end }}
