apiVersion: v1
kind: Secret
metadata:
  name: {{ include "miloagent.fullname" . }}-files
  labels:
    {{- include "miloagent.labels" . | nindent 4 }}
type: Opaque
stringData:
  # Whole credential files. Keys MUST stay in sync with the deployment subPath mounts.
  llm.yaml: |-
{{ .Values.secrets.llm | default "" | indent 4 }}
  reddit_accounts.yaml: |-
{{ .Values.secrets.reddit_accounts | default "" | indent 4 }}
  reddit_api.yaml: |-
{{ .Values.secrets.reddit_api | default "" | indent 4 }}
  twitter_accounts.yaml: |-
{{ .Values.secrets.twitter_accounts | default "" | indent 4 }}
  telegram.yaml: |-
{{ .Values.secrets.telegram | default "" | indent 4 }}
  telegram_user_accounts.yaml: |-
{{ .Values.secrets.telegram_user_accounts | default "" | indent 4 }}
