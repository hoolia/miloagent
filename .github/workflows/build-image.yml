name: build-image

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch: {}

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      short-sha: ${{ steps.sha.outputs.short }}
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Short SHA
        id: sha
        run: echo "short=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          # Resolves to ghcr.io/<repo-owner>/miloagent
          images: ghcr.io/${{ github.repository_owner }}/miloagent
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,format=short
            type=ref,event=tag

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  update-deploy:
    needs: build
    # Only fire on main branch pushes (not tags, not PRs)
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      # Dispatch to hoolia/openshift-config (private). All git work happens there
      # using its own GITHUB_TOKEN — no repo-write PAT stored in this public repo.
      # Token needed here: fine-grained PAT scoped only to hoolia/openshift-config
      # with "Contents: Write" permission (required for repository_dispatch).
      - name: Trigger image update in openshift-config
        run: |
          curl -fsSX POST \
            -H "Authorization: token ${{ secrets.OPENSHIFT_CONFIG_DISPATCH_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/hoolia/openshift-config/dispatches \
            -d "{
              \"event_type\": \"miloagent-image-push\",
              \"client_payload\": {
                \"sha\": \"${{ needs.build.outputs.short-sha }}\",
                \"commit_url\": \"https://github.com/hoolia/miloagent/commit/${{ github.sha }}\"
              }
            }"
