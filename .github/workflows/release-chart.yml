name: release-chart

on:
  push:
    branches: [main]
    paths: ["deploy/**"]
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: azure/setup-helm@v4
        with:
          version: v3.16.0

      - name: Package chart
        run: |
          mkdir -p .cr-pkg
          helm package deploy/ --destination .cr-pkg

      - name: Build merged index (preserve previously published versions)
        run: |
          git show origin/gh-pages:index.yaml > .cr-pkg/old-index.yaml 2>/dev/null || true
          if [ -s .cr-pkg/old-index.yaml ]; then
            helm repo index .cr-pkg --url https://hoolia.github.io/miloagent --merge .cr-pkg/old-index.yaml
          else
            helm repo index .cr-pkg --url https://hoolia.github.io/miloagent
          fi
          rm -f .cr-pkg/old-index.yaml

      - name: Publish to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: .cr-pkg
          keep_files: true
